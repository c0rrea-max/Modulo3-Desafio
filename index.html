<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oráculo de Ouro - Desafio Final</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Oráculo de Ouro</h1>
        <p>Descubra o Cavaleiro que rege sua constelação</p>

        <div class="form-group">
            <input type="number" id="day" placeholder="Dia" min="1" max="31">
            
            <div class="select-wrapper">
                <select id="month">
                    <option value="" disabled selected>Mês</option>
                    <option value="1">Janeiro</option>
                    <option value="2">Fevereiro</option>
                    <option value="3">Março</option>
                    <option value="4">Abril</option>
                    <option value="5">Maio</option>
                    <option value="6">Junho</option>
                    <option value="7">Julho</option>
                    <option value="8">Agosto</option>
                    <option value="9">Setembro</option>
                    <option value="10">Outubro</option>
                    <option value="11">Novembro</option>
                    <option value="12">Dezembro</option>
                </select>
            </div>
        </div>

        <button onclick="calculateSign()">Descobrir</button>

        <div id="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
